<!DOCTYPE html>
<html lang="{{ page.lang | default: 'pt-BR' }}" class="html" data-theme="{{ site.theme_config.appearance | default: 'auto' }}">
  {%- include head.html -%}
  <body>
    <script>
      (() => {
        const mode = localStorage.getItem('siteAppearanceMode');
        if (!mode) return;
        const root = document.documentElement;
        const resolved = mode === 'colorblind' ? 'light' : mode;
        root.setAttribute('data-theme', resolved);
        document.body && document.body.setAttribute('data-theme', resolved);
        root.classList.toggle('colorblind-mode', mode === 'colorblind');
      })();
    </script>

    <script>
      (() => {
        const themeWords = ['auto', 'claro', 'escuro', 'oscuro', 'dark', 'light', 'daltônico', 'daltonico', 'colorblind'];
        const candidates = Array.from(document.querySelectorAll('div, nav, section, aside, ul, ol'));
        candidates.forEach((el) => {
          const controls = Array.from(el.querySelectorAll('button, a, label, span'));
          if (!controls.length || controls.length > 20) return;
          const textBlob = controls.map((c) => (c.textContent || '').trim().toLowerCase()).join(' | ');
          const hits = themeWords.reduce((n, w) => n + (textBlob.includes(w) ? 1 : 0), 0);
          if (hits >= 3 && !el.classList.contains('appearance-toggle') && !el.closest('.appearance-toggle') && !el.classList.contains('global-language-switcher') && !el.closest('.global-language-switcher')) {
            el.remove();
          }
        });
      })();
    </script>

    <div class="global-language-switcher" role="group" aria-label="Language switcher">
      <button type="button" class="global-lang-btn" data-global-lang="pt">Português</button>
      <button type="button" class="global-lang-btn" data-global-lang="en">English</button>
      <button type="button" class="global-lang-btn" data-global-lang="es">Español</button>
    </div>

    <div class="theme-mode-switcher" role="group" aria-label="Theme mode switcher">
      <button type="button" class="theme-mode-btn" data-theme-mode="auto" data-i18n-key="theme_mode_auto">Auto</button>
      <button type="button" class="theme-mode-btn" data-theme-mode="light" data-i18n-key="theme_mode_light">Claro</button>
      <button type="button" class="theme-mode-btn" data-theme-mode="dark" data-i18n-key="theme_mode_dark">Escuro</button>
      <button type="button" class="theme-mode-btn" data-theme-mode="colorblind" data-i18n-key="theme_mode_colorblind">Daltônico</button>
    </div>

    <main class="page-content" aria-label="Content">
      <div class="w">
        {{ content }}

        {% if site.theme_config.appearance_toggle %}
          {% include toggle_theme_button.html %}
        {% endif %}

        <div class="credits">
          &copy;&nbsp;2026&nbsp;Databiomics
          <img class="credits-logo" src="{{ '/assets/databiomics-logo.svg' | relative_url }}" alt="Databiomics">
        </div>
      </div>
    </main>

    <div id="google_translate_element" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden" aria-hidden="true"></div>
    <script src="{{ '/assets/js/site-i18n.js' | relative_url }}"></script>

    {%- if site.soopr -%}
      {%- if site.soopr.publish_token and jekyll.environment == "production" -%}
        <script async defer data-soopr-token="{{ site.soopr.publish_token }}" src="https://sdk.soopr.co/soopr.js"></script>
      {%- else -%}
        <script async defer src="https://sdk.soopr.co/soopr.js"></script>
      {%- endif -%}
    {%- endif -%}
  </body>
</html>
